<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Расчёт результатов опросников</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="header">
    <h1>Расчёт результатов опросников</h1>
    <p>Загрузите xlsx или csv с ответами из Google Forms (первый лист, первая строка — заголовки).</p>
  </header>

  <div class="card">
    <div class="drop-zone" id="dropZone">
      <input type="file" id="fileInput" accept=".xlsx,.xls,.csv" />
      <svg class="drop-zone-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
      <span class="drop-label" id="dropLabel">Перетащите файл сюда или нажмите для выбора</span>
      <span class="drop-hint">Поддерживаются форматы .xlsx, .xls, .csv</span>
    </div>
    <div class="actions">
      <button type="button" class="primary" id="btnCalc" disabled>Рассчитать</button>
      <button type="button" class="secondary" id="btnDownload" disabled>Скачать результаты (xlsx)</button>
    </div>
    <div class="message" id="message"></div>
  </div>

  <div class="results-section" id="resultsSection">
    <div class="card table-wrap">
      <table id="resultsTable">
        <thead id="resultsThead"></thead>
        <tbody id="resultsBody"></tbody>
      </table>
    </div>
  </div>

  <script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>
  <script src="main.js"></script>
</body>
</html>
